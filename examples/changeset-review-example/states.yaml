# State machine diagram
# ---------------------
#
# Legend: [initial] [final]
#
#   split [initial] --> completed [final]
#        |
#        +-- appends review-<slug> tasks and one aggregate task
#
#   review (all_targets: review_targets) --> completed [final]
#
#   aggregate task path:
#
#   aggregate-reviews
#        --> validate-review (all_targets: validation_targets)
#        --> propose-fixes  (all_targets: proposal_targets)
#        --> aggregate-proposals (smart_target)
#        --> decide         (smart_target; default gpt-5.5 xhigh)
#        --> [prepare-workspace]
#        --> final-fix      (smart_target; default gpt-5.5 xhigh)
#        --> [commit-fix]
#        --> completed [final]
#
#   any non-final state --> cancelled [final]
#
# Per-task paths:
#   coordinator:   split -> completed
#   review-<slug>: review -> completed
#   aggregate:     aggregate-reviews -> validate-review -> propose-fixes
#                  -> aggregate-proposals -> decide [-> prepare-workspace]
#                  -> final-fix [-> commit-fix] -> completed

name: changeset-review
version: 1.1.0

states:
  split:
    description: Coordinator writes an architectural overview of the change, then spawns one review task per logical part plus an aggregate task.
    initial: true
    target: codex[xhigh]:openai:gpt-5.5
    instructions: |
      You are the change-review coordinator for Task {task_id}: {task_title}.

      Treat this instantiated workspace as a scratchpad. Resolve the
      repository root with `git rev-parse --show-toplevel` from the current
      workspace and use that repository root for all VCS commands and all
      repository file lookups. Do not assume the workspace directory itself
      contains the repository files. Runtime artifacts (`runtime/...`) and
      task files (`tasks/...`) must always be written under the instantiated
      scratchpad workspace, even when repository inspection happens from the
      Git toplevel.

      0. Resolve `PR#42` to a concrete set of files and a diff.
         The reference can be any of:
           - a PR URL or PR number (e.g. `#42`, `org/repo#42`, full URL)
           - a branch name (compare against the project's default branch)
           - a commit SHA or range `base..head`
           - a path to a `.diff` or `.patch` file on disk
         Use the project's VCS tooling (`gh`, `git diff`, `git log`, etc.)
         from the resolved repository root to produce the changed-file list
         and unified diff. If the reference is ambiguous, resolve it the
         narrowest way consistent with the user's intent and note the
         assumption in the overview.

      1. Produce an architectural overview of the resolved change.
         Write it to `{output.architecture-overview.path}` covering:
           - the user-visible or operational intent of the change
           - the subsystems touched and how responsibility moves between them
           - new or changed public interfaces, data models, and contracts
           - cross-cutting concerns introduced by the change
           - risks reviewers should keep in mind while reading parts

         Include a "Metadata" subsection that captures:
           - the resolved repository root path
           - whether the change is accompanied by a PR, including title and
             body when available
           - commit subjects and bodies on the change
           - intersecting specs, ADRs, docs, or `Specs: none`
           - whether the change is user-facing (`yes` or `no`) with a
             one-line justification

      2. Split the change into review parts.
         Code parts should follow logical ownership boundaries (subsystem,
         file cluster, behavior, or risk). Add meta parts when applicable:
           - `pr-description` if the change arrived as a PR
           - `commit-messages` always
           - `documentation` if the change is user-facing
           - `spec` if specs or ADRs intersect the change

      3. Write the part manifest to `{output.parts-manifest.path}`.
         Each entry records a stable slug, part type, file/material scope,
         one-line focus summary, and pointer to the overview section.

      4. For every part, append a task file under `tasks/` named
         `NN-review-<slug>.md`:

           ### Task review-<slug>: Review <part title>
           **State:** review
           **Prior:** Task {task_id}

           <part scope, files/materials, and specific questions>

         Replace every placeholder above with concrete text. Do not leave
         angle-bracket placeholders in generated task files. Each generated
         task id must be stable and unique.

      5. Append one aggregate task file under `tasks/`:

           ### Task aggregate: Aggregate, validate, adjudicate, and fix review findings
           **State:** aggregate-reviews
           **Prior:** Task review-<slug-1>, Task review-<slug-2>, ...

           Use the review artifacts to produce a validated issue list,
           aggregate fix proposals, let the smart target decide discrepancies,
           and apply final fixes.

         The aggregate task id must be exactly `aggregate`. Replace the
         example `**Prior:**` list with the concrete review task ids you
         created; do not leave ellipses or placeholders behind.

      6. Transition to `completed`.
    outputs:
      - name: architecture-overview
        path: runtime/manifests/{task_id}-architecture.md
        description: Architectural overview of the change
      - name: parts-manifest
        path: runtime/manifests/{task_id}-parts.md
        description: Stable list of change parts and scopes

  review:
    description: Independent per-target review of one part of the change.
    all_targets:
      - claude-code[yolo]:anthropic:claude-opus-4-7
      - codex[xhigh]:openai:gpt-5.5
    personality: |
      You are {target}, a rigorous reviewer. Focus on correctness,
      regressions, and material risks specific to the assigned part. Skip
      pure style nits unless they indicate a real defect.
    instructions: |
      Review Task {task_id}: {task_title}.

      Read the part scope from the task body and consult the architectural
      overview at `runtime/manifests/coordinate-architecture.md`. Treat this
      workspace as a scratchpad: resolve the Git toplevel before reading
      repository files, but keep runtime artifact paths anchored to this
      workspace.

      Organize findings into these focus subsections. Every subsection must
      appear, even if empty (write `- none`):
        - performance
        - security
        - concurrency

      Write findings to `{output.part-findings.path}` in this shape:

        # Part Review: {task_title} - target {target}

        ## performance

        - R-<short-id>: <one-line finding>
          - Severity: high | medium | low
          - File: <path>
          - Detail: <what is wrong or risky, and why>
          - Evidence: <specific code/spec/test evidence>

        ## security

        - R-<short-id>: <one-line finding>
          - Severity: high | medium | low
          - File: <path>
          - Detail: <what is wrong or risky, and why>
          - Evidence: <specific code/spec/test evidence>

        ## concurrency

        - R-<short-id>: <one-line finding>
          - Severity: high | medium | low
          - File: <path>
          - Detail: <what is wrong or risky, and why>
          - Evidence: <specific code/spec/test evidence>

      Keep findings specific and actionable. Transition to `completed` when
      the findings file is written.
    outputs:
      - name: part-findings
        path: runtime/findings/{task_id}-{target.slug}.md
        description: One target's findings for one part of the change

  aggregate-reviews:
    description: Smart target deduplicates reviewer findings into candidate issues.
    target: codex[xhigh]:openai:gpt-5.5
    personality: |
      You are the review aggregator. Deduplicate aggressively, preserve
      evidence, and do not invent issues beyond what reviewers reported.
    instructions: |
      Aggregate review findings for Task {task_id}: {task_title}.

      1. Read every file under `runtime/findings/` produced by the review
         tasks listed in this task's `**Prior:**`.
      2. Deduplicate findings that describe the same defect across parts or
         targets. Preserve disagreements and weak evidence; do not discard
         them silently.
      3. Write candidate issues to `{output.review-issues.path}` in this
         shape:

         # Candidate Review Issues - PR#42

         - I-001 (severity: high | medium | low) - <one-line issue>
           - Status: candidate
           - Files: <paths>
           - Reviewers: <which targets reported it>
           - Evidence: <best concrete evidence>
           - Disagreements: <none, or what differed across reviewers>

      4. Transition to `validate-review`.
    outputs:
      - name: review-issues
        path: runtime/issues/{task_id}-candidate-issues.md
        description: Deduplicated candidate review issues

  validate-review:
    description: Independent per-target validation that candidate issues are correct.
    all_targets:
      - claude-code[yolo]:anthropic:claude-opus-4-7
      - codex[xhigh]:openai:gpt-5.5
    inputs:
      - name: review-issues
        path: runtime/issues/{task_id}-candidate-issues.md
    personality: |
      You are {target}, a skeptical validator. Confirm whether each candidate
      issue is real, actionable, and supported by the code/spec evidence.
    instructions: |
      Validate candidate review issues for Task {task_id}: {task_title}.

      Read `{input.review-issues.path}` and inspect the referenced code,
      specs, tests, and diff. For each issue, independently classify it:
      `valid`, `invalid`, or `needs-decision`.

      Write `{output.validation.path}` in this shape:

        # Review Validation - target {target}

        - I-001: valid | invalid | needs-decision
          - Reason: <short evidence-based rationale>
          - Correction: <if the issue statement should be narrowed or changed>

      Transition to `propose-fixes` when the validation file is written.
    outputs:
      - name: validation
        path: runtime/validations/{task_id}-{target.slug}.md
        description: One target's validation of candidate review issues

  propose-fixes:
    description: Independent per-target fix proposals for the validated issue set.
    all_targets:
      - claude-code[yolo]:anthropic:claude-opus-4-7
      - codex[xhigh]:openai:gpt-5.5
    inputs:
      - name: review-issues
        path: runtime/issues/{task_id}-candidate-issues.md
    personality: |
      You are {target}, a fix designer. Propose minimal, concrete changes.
      Do not edit files in this state. Be cautious about scope: if a nit or
      low-value issue would require a broad or invasive change, recommend
      rejecting or deferring it instead of proposing a wide fix.
    instructions: |
      Propose fixes for Task {task_id}: {task_title}.

      Read `{input.review-issues.path}` and the validation files under
      `runtime/validations/`. For every candidate issue that at least one
      validator marked `valid` or `needs-decision`, propose the smallest
      fix that would address it. If the issue is a nit, style preference, or
      low-value cleanup that would require a large or risky change, mark it as
      "defer/no-fix" in the proposal instead of designing a broad edit. Do not
      modify repository files.

      Write `{output.fix-proposal.path}` in this shape:

        # Fix Proposal - target {target}

        - I-001
          - Proposed action: <concrete change>
          - Files to edit: <paths>
          - Tests/checks: <commands or files>
          - Risk: low | medium | high
          - Scope judgment: minimal-fix | defer-no-fix
          - Notes on validation disagreement: <none or summary>

      Transition to `aggregate-proposals` when the proposal file is written.
    outputs:
      - name: fix-proposal
        path: runtime/proposals/{task_id}-{target.slug}.md
        description: One target's proposed fixes for candidate issues

  aggregate-proposals:
    description: Smart target aggregates fix proposals into a discrepancy matrix.
    target: codex[xhigh]:openai:gpt-5.5
    inputs:
      - name: review-issues
        path: runtime/issues/{task_id}-candidate-issues.md
    personality: |
      You are the proposal aggregator. Compare proposed fixes without editing
      files. Preserve disagreements so the final adjudicator can decide them
      explicitly.
    instructions: |
      Aggregate fix proposals for Task {task_id}: {task_title}.

      Read:
        - `{input.review-issues.path}`
        - all validation files under `runtime/validations/`
        - all proposal files under `runtime/proposals/`

      Write `{output.proposal-matrix.path}` in this shape:

        # Fix Proposal Matrix - PR#42

        - I-001 - <issue summary>
          - Validation summary: <valid/invalid/needs-decision by target>
          - Proposed approaches:
            - <target>: <short proposed action>
          - Agreement: full | partial | none
          - Scope judgment: minimal-fix | defer-no-fix | disputed
          - Discrepancy: <none, or what the final adjudicator must decide>

      Mark nits or low-value issues as `defer-no-fix` when every reasonable
      proposal would require broad changes. Transition to `decide` when the
      proposal matrix is written.
    outputs:
      - name: proposal-matrix
        path: runtime/proposals/{task_id}-proposal-matrix.md
        description: Aggregated fix proposal matrix and discrepancy summary

  decide:
    description: Smart target adjudicates validation/proposal discrepancies and writes the final fix plan.
    target: codex[xhigh]:openai:gpt-5.5
    inputs:
      - name: review-issues
        path: runtime/issues/{task_id}-candidate-issues.md
      - name: proposal-matrix
        path: runtime/proposals/{task_id}-proposal-matrix.md
    personality: |
      You are the final adjudicator. Resolve discrepancies conservatively:
      accept only issues that are supported by evidence and have a bounded
      fix. Prefer no-op over speculative edits. If fixing a nit would require
      broad rewrites, cross-cutting refactors, or risky behavior changes,
      reject or defer it.
    instructions: |
      Decide the final fix plan for Task {task_id}: {task_title}.

      Read:
        - `{input.review-issues.path}`
        - `{input.proposal-matrix.path}`
        - all validation files under `runtime/validations/`
        - all proposal files under `runtime/proposals/`

      For each candidate issue:
        - decide `accepted`, `rejected`, or `defer`
        - explain validation/proposal discrepancies
        - choose or synthesize one final approach when accepted
        - keep the final approach minimal and testable
        - reject/defer nits and low-value issues whose fix would be too broad

      Write `{output.final-decision.path}` in this shape:

        # Final Review Decision - PR#42

        ## Accepted Fixes

        - I-001 - <summary>
          - Files: <paths>
          - Final approach: <exact implementation direction>
          - Tests/checks: <commands or files>
          - Discrepancy decision: <why this approach won>

        ## Rejected / Deferred

        - I-002 - rejected | defer
          - Reason: <why not fixing now>

      Transition to `prepare-workspace`.
    outputs:
      - name: final-decision
        path: runtime/decisions/{task_id}-final-decision.md
        description: Smart-target adjudication and final fix plan


  prepare-workspace:
    description: Set up an isolated workspace (worktree) before applying final fixes.
    target: codex[xhigh]:openai:gpt-5.5
    inputs:
      - name: final-decision
        path: runtime/decisions/{task_id}-final-decision.md
    instructions: |
      Prepare the final-fix workspace for Task {task_id}: {task_title}.

      Read `{input.final-decision.path}`. Treat this review workspace as a
      scratchpad. Resolve the repository root with `git rev-parse
      --show-toplevel` and use that checkout as the source for isolation.
      Runtime artifacts must still be written under the original scratchpad
      workspace, not inside any prepared branch, worktree, or fork checkout.

      Create an isolated workspace using mode `worktree`:
        - Create a worktree under `runtime/worktrees/{task_id}/` on branch
          `fix/{task_id}`.

      Record the resulting location to `{output.workspace-ref.path}`:

        mode: worktree
        path: <absolute path where final-fix must work>
        branch: <branch name>
        base: <commit or branch>

      Transition to `final-fix` once the workspace is ready.
    outputs:
      - name: workspace-ref
        path: runtime/workspaces/{task_id}.yaml
        description: Location and branch of the isolated final-fix workspace


  final-fix:
    description: Smart target applies the accepted final fixes.
    target: codex[xhigh]:openai:gpt-5.5
    inputs:
      - name: final-decision
        path: runtime/decisions/{task_id}-final-decision.md
      - name: workspace-ref
        path: runtime/workspaces/{task_id}.yaml
    personality: |
      You are the final fix agent. Apply only the accepted fixes from the
      final decision. Do not broaden scope. If an accepted item turns out to
      require a much wider change than the final decision described, stop and
      record it as not fixed instead of expanding the patch.
    instructions: |
      Apply final fixes for Task {task_id}: {task_title}.

      At the start of this state, record the current directory as the review
      scratchpad workspace. All `{input.*.path}` and `{output.*.path}` paths
      are relative to that scratchpad. Repository edits may happen elsewhere,
      but runtime artifacts must be written back to the scratchpad paths.

      Read `{input.final-decision.path}`.

      Read `{input.workspace-ref.path}` and perform all repository edits in
      the recorded workspace path. Do not write Rhei runtime artifacts inside
      that prepared workspace.

      Apply only issues listed under "Accepted Fixes". Keep each change as
      narrow as the final decision allows. If a nit or low-value issue would
      require a large change, do not implement it; record that it was skipped
      because the required scope was too wide. If there are no accepted fixes,
      make no repository edits and write a no-op note.

      Write `{output.final-fix-note.path}` with:
        - accepted issue ids fixed
        - files touched
        - tests/checks run, or why they were not run
        - any accepted issue intentionally left unfixed and why

      Transition to `commit-fix`.
    outputs:
      - name: final-fix-note
        path: runtime/fixes/{task_id}-final-fix.md
        description: Summary of final fixes applied by the smart target


  commit-fix:
    description: Smart target commits or publishes the final fixes (pr).
    target: codex[xhigh]:openai:gpt-5.5
    inputs:
      - name: final-fix-note
        path: runtime/fixes/{task_id}-final-fix.md
      - name: workspace-ref
        path: runtime/workspaces/{task_id}.yaml
    instructions: |
      Commit or publish final fixes for Task {task_id}: {task_title}.
      At the start of this state, record the current directory as the review
      scratchpad workspace. All `{input.*.path}` and `{output.*.path}` paths
      are relative to that scratchpad. Commit/push/PR commands may run in the
      repository checkout, but runtime artifacts must be written back to the
      scratchpad paths.

      Operate inside the workspace recorded at `{input.workspace-ref.path}`.

      Commit mode: `pr`.
        - Stage only files listed in `{input.final-fix-note.path}`.
        - Create one local commit, push the branch, and open a pull request.
          The PR body must reference the final decision artifact and summarize
          accepted issues fixed.

      Record the result to `{output.commit-ref.path}`:

        mode: pr
        commit: <sha>
        remote_ref: <branch pushed, or empty>
        pr_url: <URL, or empty>

      Transition to `completed`.
    outputs:
      - name: commit-ref
        path: runtime/commits/{task_id}.yaml
        description: Commit SHA and optional remote/PR reference


  completed:
    description: Task is done.
    instructions: |
      No further action required for Task {task_id}.
    final: true

  cancelled:
    description: Task was cancelled before completion.
    instructions: |
      Stop all work on Task {task_id}. Leave existing artifacts in place.
    final: true

transitions:
  - from: split
    to: completed
    description: Coordinator emitted the part manifest and spawned review plus aggregate tasks.

  - from: review
    to: completed
    description: Every configured review target wrote findings for this part.

  - from: aggregate-reviews
    to: validate-review
    description: Candidate issues are deduplicated and ready for validation.

  - from: validate-review
    to: propose-fixes
    description: Validation targets classified candidate issues.

  - from: propose-fixes
    to: aggregate-proposals
    description: Proposal targets wrote issue-by-issue fix proposals.

  - from: aggregate-proposals
    to: decide
    description: Proposal matrix is written; smart target decides discrepancies.


  - from: decide
    to: prepare-workspace
    description: Final decision is written; prepare isolated workspace.

  - from: prepare-workspace
    to: final-fix
    description: Isolated workspace is ready; apply final fixes.



  - from: final-fix
    to: commit-fix
    description: Final fixes are applied; commit or publish them.

  - from: commit-fix
    to: completed
    description: Commit or publication reference recorded.


  - from: "*"
    to: cancelled
    description: Cancel the task from any non-final state.