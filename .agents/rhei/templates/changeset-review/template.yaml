name: changeset-review
version: 1.1.0
description: Review a code change with two-agent review, validation, fix proposals, smart-agent adjudication, and smart-agent fixes.

inputs:
  - name: change_ref
    description: The change to review. Any of — a PR URL or number, a branch name, a commit SHA (or range `base..head`), or a path to a .diff/.patch file. The coordinator resolves it to an actual set of files before splitting.
    type: string

  - name: review_targets
    description: Execution targets that independently review each part of the change (one parallel pass per target)
    type: array
    items:
      type: string
    default:
      - claude-code[yolo]:anthropic:claude-opus-4-7
      - codex[xhigh]:openai:gpt-5.5

  - name: validation_targets
    description: Execution targets that independently validate whether the aggregated review issues are correct and actionable
    type: array
    items:
      type: string
    default:
      - claude-code[yolo]:anthropic:claude-opus-4-7
      - codex[xhigh]:openai:gpt-5.5

  - name: proposal_targets
    description: Execution targets that independently propose concrete fixes for each validated issue
    type: array
    items:
      type: string
    default:
      - claude-code[yolo]:anthropic:claude-opus-4-7
      - codex[xhigh]:openai:gpt-5.5

  - name: review_focus
    description: Optional focus areas each reviewer must address as its own subsection (e.g., performance, security, concurrency). Empty means a general review.
    type: array
    items:
      type: string
    default: []

  - name: smart_target
    description: Smarter execution target that aggregates reviews, adjudicates discrepancies, performs final fixes, and optionally commits them
    type: string
    default: codex[xhigh]:openai:gpt-5.5

  - name: fix_prepare
    description: Optional pre-fix workspace isolation before the smart target applies final fixes. One of — none (apply in-tree), branch (create a new branch), worktree (create a git worktree), fork (fork the repo before working).
    type: string
    default: none
    validate: "^(none|branch|worktree|fork)$"

  - name: fix_commit
    description: Optional post-fix commit behavior. One of — none (leave uncommitted), commit (local commit), push (commit and push to remote), pr (commit, push, open PR).
    type: string
    default: none
    validate: "^(none|commit|push|pr)$"
