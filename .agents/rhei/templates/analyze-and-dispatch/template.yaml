name: analyze-and-dispatch
version: 1.0.0
description: A coordinator task analyzes a subject and dynamically creates the follow-up tasks. The number and shape of the spawned tasks is decided at run time by the analyzing agent — not fixed at instantiation — and an optional report task is wired to depend on all of them.

inputs:
  - name: subject
    description: What the coordinator analyzes (a directory, document, dataset, backlog, etc.). The agent reads this to decide what work items to spawn.
    type: string
    required: true

  - name: analysis_brief
    description: How the coordinator should analyze the subject and what counts as one spawned task. This is the "neural" decision — describe the unit of work, not a fixed list.
    type: string
    required: true

  - name: plan_title
    description: Title of the instantiated workspace (index heading).
    type: string
    default: Analyze & Dispatch

  - name: coordinator_agent
    description: Agent that performs the analysis and writes the follow-up task files. Use a capable model — it owns the decomposition.
    type: string
    default: claude-code[yolo]:anthropic:claude-opus-4-7

  - name: worker_agent
    description: Agent that handles each spawned work item.
    type: string
    default: claude-code[yolo]:anthropic:claude-opus-4-7

  - name: max_tasks
    description: Upper bound on how many work-item tasks the coordinator may create, so a bad analysis can't spawn unbounded work.
    type: number
    default: 8
