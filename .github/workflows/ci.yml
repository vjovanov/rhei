name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: cargo test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.82.0
          components: clippy, rustfmt

      - name: Install current stable Rust for tooling
        uses: dtolnay/rust-toolchain@stable

      - name: Install Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Cache cargo registry and target
        uses: actions/cache@v5
        continue-on-error: true
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install grund
        shell: bash
        run: cargo +stable install grund --locked

      - name: grund config validate
        run: grund config validate

      - name: grund check
        run: grund check .

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings -W clippy::all

      - name: changelog PR entry
        if: github.event_name == 'pull_request'
        run: python scripts/check_changelog_pr_entry.py --pr-number "${{ github.event.pull_request.number }}"

      - name: Install pre-commit hook dependencies
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          python -m pip install pre-commit
          cargo +stable install lychee --version 0.23.0 --locked

      - name: pre-commit
        if: matrix.os == 'ubuntu-latest'
        run: pre-commit run --all-files

      - name: cargo build
        run: cargo build --workspace --all-targets --locked

      - name: cargo test
        if: matrix.os != 'windows-latest'
        run: cargo test --workspace --all-targets --locked --no-fail-fast
