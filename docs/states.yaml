# States Definition for Markdown Plan Compiler
# This file defines valid states for tasks

name: task-states
version: 1.0

states:
  draft:
    description: Task not yet started

  pending:
    description: Task not yet started

  in-progress:
    description: Task currently being worked on

  completed:
    description: Task finished successfully

  cancelled:
    description: Task no longer needed

  human-review:
    description: Agents stop and leave the human to adjust the saga

  agent-review:
    description: Agents are currently reviewing the task result
